esphome:
  name: radish
  friendly_name: Radish

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Internal RGB LED configuration
light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO35
    num_leds: 1
    id: status_led
    name: "Atom S3 Status LED"
    chipset: WS2812
    internal: true

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO41
      inverted: true
    name: "AtomS3 Button"
    on_press:
      then:
        - light.turn_on:
            id: status_led
            red: 100%
            green: 0%
            blue: 0%
            brightness: 60%
            transition_length: "0s"
    on_release:
      then:
        - light.turn_off:
            id: status_led
            transition_length: "0s"
              

# Configure the hardware UART for the Tail485
uart:
  id: rs485_bus
  tx_pin: GPIO2 # Swap GPIO pins or physical A/B wires if output is garbled
  rx_pin: GPIO1
  baud_rate: 9600
  debug:
    direction: RX
    dummy_receiver: true
    after:
      bytes: 256
      timeout: 100ms
    sequence:
      - mqtt.publish:
          topic: radish/rs485/raw
          payload: !lambda |-
            char buf[5];
            std::string hex;
            for (auto b : bytes) {
                sprintf(buf, "%02X ", b);
                hex += buf;
            }
            return hex;

# Enable MQTT
mqtt:
  broker: homeassistant.local # Change to your MQTT broker address if different
  username: !secret mqtt_user
  password: !secret mqtt_password

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "" # Generated key

ota:
  - platform: esphome
    password: "" # Generated password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Radish Fallback Hotspot"
    password: "" # Generated password

captive_portal:
    
